<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnTheTok - Operating System untuk TikTok Affiliate Manager</title>
    <meta name="description"
        content="OnTheTok adalah OS pertama yang mengintegrasikan seluruh siklus affiliate TikTok. Hemat 2.867 jam/bulan, kurangi 97% biaya operasional.">
    <meta name="keywords" content="TikTok, Affiliate, Manager, Automation, Indonesia, OnTheTok">

    <!-- Favicon -->
    <link rel="icon" href="https://flxr2.com/ott/logo.png" type="image/png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Base CSS -->
    <link rel="stylesheet" href="base.css">

    <!-- Liquid Glass Design System -->
    <link rel="stylesheet" href="liquid-glass.css">

    <!-- Glass Overrides — lifts dark sections/cards to translucent glass -->
    <link rel="stylesheet" href="glass-overrides.css">

    <!-- Liquid Glass Shader (Three.js) — loads via ES module -->
    <script type="module" src="liquid-glass-shader.js" defer></script>

    <style>
        /* Hide Scrollbar */
        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        html,
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        html {
            overflow-y: scroll;
        }

        /* Make body transparent so glass-bg-layer shows through */
        body {
            background-color: transparent !important;
        }

        /* Ensure all sections sit above the shader canvas */
        #section-header, #section-hero, #section-pain-points, #section-solution,
        #section-workflow, #section-features, #section-roi, #section-pricing,
        #section-faq, #section-footer {
            position: relative;
            z-index: 3;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: var(--bg-dark, #010101);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }

        .loading-logo {
            width: 120px;
            height: auto;
            margin-bottom: 24px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.9;
            }
        }

        .loading-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 56px;
            color: #ffffff;
            letter-spacing: -0.02em;
            margin-bottom: 40px;
            text-shadow:
                -3px -2px 0px #25F4EE,
                3px 3px 0px #FE2C55;
            animation: glitchLoading 3s ease-in-out infinite;
        }

        @keyframes glitchLoading {
            0%, 100% {
                text-shadow: -3px -2px 0px #25F4EE, 3px 3px 0px #FE2C55;
            }
            10% {
                text-shadow: 3px 2px 0px #25F4EE, -2px -3px 0px #FE2C55;
            }
            20% {
                text-shadow: -2px 3px 0px #25F4EE, 3px -2px 0px #FE2C55;
            }
            30% {
                text-shadow: 3px -2px 0px #25F4EE, -3px 3px 0px #FE2C55;
            }
        }

        .loading-bar-container {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            overflow: hidden;
            margin: 0 auto;
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #25F4EE, #FE2C55);
            border-radius: 100px;
            box-shadow: 0 0 20px #25F4EE;
            transition: width 0.3s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- LIQUID GLASS BACKGROUND — static gradient beneath shader -->
    <div class="glass-bg-layer"></div>
    <!-- Floating orbs — TikTok aesthetic drift -->
    <div class="glass-orb glass-orb-pink"></div>
    <div class="glass-orb glass-orb-cyan"></div>
    <!-- LIQUID GLASS SHADER CANVAS — Three.js refraction layer -->
    <canvas id="glass-canvas"></canvas>

    <!-- LOADING SCREEN -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <img src="https://flxr2.com/ott/logo.png" alt="OnTheTok" class="loading-logo">
            <h1 class="loading-text">OnTheTok</h1>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
        </div>
    </div>

    <!-- SECTION CONTAINERS -->
    <div id="section-header"></div>
    <div id="section-hero"></div>
    <div id="section-brand-carousel"></div>
    <div id="section-pain-points"></div>
    <div id="section-solution"></div>
    <div id="section-workflow"></div>
    <div id="section-features"></div>
    <div id="section-roi"></div>
    <div id="section-stats"></div>
    <div id="section-testimonials"></div>
    <div id="section-pricing"></div>
    <div id="section-faq"></div>
    <div id="section-final-cta"></div>
    <div id="section-footer"></div>

    <!-- SECTION LOADER SCRIPT -->
    <script>
        /**
         * OnTheTok Section Loader
         * Loading bar sekarang mengikuti progress sebenarnya
         */

        const sections = [
            { id: 'section-header', file: 'sections/01-header.html' },
            { id: 'section-hero', file: 'sections/02-hero.html' },
            // { id: 'section-brand-carousel', file: 'sections/02a-brand-carousel.html' },
            { id: 'section-pain-points', file: 'sections/03-pain-points.html' },
            { id: 'section-solution', file: 'sections/04-solution.html' },
            { id: 'section-workflow', file: 'sections/05-workflow.html' },
            { id: 'section-features', file: 'sections/06-features.html' },
            { id: 'section-roi', file: 'sections/07-roi.html' },
            // { id: 'section-stats', file: 'sections/08-stats.html' },
            // { id: 'section-testimonials', file: 'sections/09-testimonials.html' },
            { id: 'section-pricing', file: 'sections/10-pricing.html' },
            { id: 'section-faq', file: 'sections/11-faq.html' },
            // { id: 'section-final-cta', file: 'sections/12-final-cta.html' },
            { id: 'section-footer', file: 'sections/13-footer.html' }
        ];

        let loadedCount = 0;
        const totalSections = sections.length;
        const loadingBar = document.getElementById('loadingBar');

        // Update loading bar progress
        function updateProgress() {
            const progress = (loadedCount / totalSections) * 100;
            loadingBar.style.width = progress + '%';
        }

        // Function to load a single section
        async function loadSection(section) {
            try {
                const response = await fetch(section.file);
                if (!response.ok) {
                    console.warn(`Section not found: ${section.file}`);
                    return;
                }
                const html = await response.text();
                const container = document.getElementById(section.id);
                if (container) {
                    container.innerHTML = html;

                    // Execute any scripts in the loaded HTML
                    const scripts = container.querySelectorAll('script');
                    scripts.forEach(script => {
                        const newScript = document.createElement('script');
                        if (script.src) {
                            newScript.src = script.src;
                        } else {
                            newScript.textContent = script.textContent;
                        }
                        document.body.appendChild(newScript);
                    });
                }
            } catch (error) {
                console.warn(`Error loading ${section.file}:`, error);
            } finally {
                loadedCount++;
                updateProgress();
                
                if (loadedCount === totalSections) {
                    hideLoadingScreen();
                }
            }
        }

        // Load all sections sequentially for smooth progress bar
        async function loadAllSections() {
            for (const section of sections) {
                await loadSection(section);
            }
        }

        // Hide loading screen with slight delay after 100%
        function hideLoadingScreen() {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loadingScreen');
                if (loadingScreen) {
                    loadingScreen.classList.add('hidden');
                }
            }, 400);
        }

        // Start loading when DOM is ready
        document.addEventListener('DOMContentLoaded', loadAllSections);

        // Fallback: hide loading screen after timeout
        setTimeout(() => {
            const loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
                loadingBar.style.width = '100%';
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                }, 300);
            }
        }, 8000);
    </script>
</body>

</html>
