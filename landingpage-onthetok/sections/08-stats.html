<!-- ============================================
     SECTION 8: STATS COUNTER
     OnTheTok Landing Page
     ============================================ -->

<style>
.stats-section {
    padding: 70px 0;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px;
}

@media (max-width: 768px) {
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
    }
}

.stat-item {
    text-align: center;
}

.stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 800;
    color: #000;
    margin-bottom: 8px;
    line-height: 1;
}

.stat-label {
    font-size: 14px;
    font-weight: 500;
    color: rgba(0, 0, 0, 0.6);
}
</style>

<section class="stats-section">
    <div class="container">
        <div class="stats-grid">
            <div class="stat-item reveal">
                <div class="stat-value" data-target="10000">10,000+</div>
                <div class="stat-label">Kreator Managed</div>
            </div>
            <div class="stat-item reveal">
                <div class="stat-value" data-target="150">150+</div>
                <div class="stat-label">Campaign Success</div>
            </div>
            <div class="stat-item reveal">
                <div class="stat-value" data-target="2867">2,867</div>
                <div class="stat-label">Jam Saved/Month</div>
            </div>
            <div class="stat-item reveal">
                <div class="stat-value" data-target="95">95%</div>
                <div class="stat-label">Submission Rate</div>
            </div>
        </div>
    </div>
</section>

<script>
// Counter animation
function animateCounter(element, target) {
    const duration = 2000;
    const steps = 60;
    const increment = target / steps;
    let current = 0;
    const originalText = element.textContent;
    const suffix = originalText.includes('+') ? '+' : (originalText.includes('%') ? '%' : '');
    
    const timer = setInterval(() => {
        current += increment;
        if (current >= target) {
            element.textContent = target.toLocaleString() + suffix;
            clearInterval(timer);
        } else {
            element.textContent = Math.floor(current).toLocaleString() + suffix;
        }
    }, duration / steps);
}

const statsObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('active');
            const valueEl = entry.target.querySelector('.stat-value');
            if (valueEl && valueEl.dataset.target) {
                animateCounter(valueEl, parseInt(valueEl.dataset.target));
            }
            statsObserver.unobserve(entry.target);
        }
    });
}, { threshold: 0.5 });

document.querySelectorAll('.stats-section .stat-item').forEach(el => statsObserver.observe(el));
</script>
